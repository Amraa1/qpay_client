name: CI
on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.11.7"
      - run: uvx ruff check .
      - run: uvx ruff format --check .
