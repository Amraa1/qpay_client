components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    AuthToken:
      type: object
      required:
        - token_type
        - refresh_expires_in
        - refresh_token
        - access_token
        - expires_in
        - scope
        - not-before-policy
        - session_state

      properties:
        token_type:
          type: string
        refresh_expires_in:
          type: integer
        refresh_token:
          type: string
        access_token:
          type: string
        expires_in:
          type: integer
        scope:
          type: string
        not-before-policy:
          type: string
        session_state:
          type: string
    CreateInvoiceRequest:
      type: object
      required:
        - invoice_code
        - sender_invoice_no
        - invoice_receiver_code
        - invoice_description
      properties:
        invoice_code:
          type: string
          maxLength: 45
          description: qPay-ээс өгсөн нэхэмжлэхийн код
        sender_invoice_no:
          type: string
          maxLength: 45
          description: Байгууллагаас үүсгэх давтагдашгүй нэхэмжлэлийн дугаар
        subscription_webhook:
          type: string
          format: uri
          description: Callback URL
        next_payment_date:
          type: string
          format: date-time
          description: Төлбөр татах өдөр цаг
        sender_branch_code:
          type: string
          maxLength: 45
        sender_branch_data:
          $ref: "#/components/schemas/BranchData"
        sender_staff_code:
          type: string
          maxLength: 100
        allow_subscribe:
          type: boolean
        sender_staff_data:
          type: object
          description: Байгууллагын ажилтаны мэдээлэл (spec тодорхойгүй)
        sender_terminal_code:
          type: string
          maxLength: 45
        sender_terminal_data:
          $ref: "#/components/schemas/TerminalData"
        invoice_receiver_code:
          type: string
          maxLength: 45
          description: Нэхэмжлэхийг хүлээн авч буй харилцагчийн дахин давтагдашгүй дугаар
        invoice_receiver_data:
          $ref: "#/components/schemas/ReceiverData"
        invoice_description:
          type: string
          maxLength: 255
        subscription_interval:
          type: string
          pattern: '^[1-9]\d{0,3}[DWM]$'
        invoice_due_date:
          type: string
          format: date
        enable_expiry:
          type: boolean
          default: false
          description: Хугацаа хэтэрсэн ч төлж болох эсэх
        expiry_date:
          type: string
          format: date
          description: Нэхэмжлэхийн дуусах хугацаа
        tax_type:
          type: string
          description: "1 - НӨАТ тооцогдох бүтээгдэхүүн 2: НӨАТ-гүй бүтээгдэхүүн 3: НӨАТ-аас чөлөөлөгдөх бүтээгдэхүүн /tax_type: 2,3 үед calculate_vat-ийг false гэж үүсгэнэ үү/"
          enum: ["1", "2", "3"]
        calculate_vat:
          type: boolean
          default: false
          description: НӨАТ-ын тооцоолол
        tax_customer_code:
          type: string
          description: >-
            ИБаримт үүсгүүлэх байгууллага/хэрэглэгчийн регистр (spec тайлбар нь
            олон утгатай тул string гэж үлдээлээ)
        line_tax_code:
          type: string
          description: БТҮК код (Lines хоосон үед ашиглана)
        allow_partial:
          type: boolean
          default: false
          description: Хувааж төлж болох эсэх
        minimum_amount:
          type: number
          description: Төлөх хамгийн бага дүн
        allow_exceed:
          type: boolean
          default: false
          description: Илүү төлж болох эсэх
        maximum_amount:
          type: number
          description: Төлөх хамгийн их дүн
        amount:
          type: number
          description: Мөнгөн дүн
        callback_url:
          type: string
          maxLength: 255
          format: uri
          description: Callback URL
        note:
          type: string
          maxLength: 1000
        lines:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/InvoiceLine"
        transactions:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/Transaction"
      additionalProperties: false
    BranchData:
      type: object
      properties:
        register:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 100
        email:
          type: string
          maxLength: 255
          format: email
        phone:
          type: string
          maxLength: 20
        address:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    Address:
      type: object
      properties:
        city:
          type: string
          maxLength: 100
        district:
          type: string
          maxLength: 100
        street:
          type: string
          maxLength: 100
        building:
          type: string
          maxLength: 100
        address:
          type: string
          maxLength: 100
        zipcode:
          type: string
          maxLength: 20
        longitude:
          type: string
          maxLength: 20
        latitude:
          type: string
          maxLength: 20
      additionalProperties: false
    TerminalData:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
      additionalProperties: false
    ReceiverData:
      type: object
      properties:
        register:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 100
        email:
          type: string
          maxLength: 255
          format: email
        phone:
          type: string
          maxLength: 20
        address:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    InvoiceLine:
      type: object
      required:
        - line_description
        - line_quantity
        - line_unit_price
      properties:
        sender_product_code:
          type: string
          maxLength: 45
        tax_product_code:
          type: string
          maxLength: 45
        line_description:
          type: string
          maxLength: 255
        line_quantity:
          type: integer
          minimum: 0
          maximum: 1000000
          format: int32

        line_unit_price:
          type: number
          minimum: 0
          maximum: 100000000000000
          format: double

        note:
          maxLength: 1000
          type: string
        discounts:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/Discount"
        surcharges:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/Surcharge"
        taxes:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/Tax"
      additionalProperties: false
    Discount:
      type: object
      required:
        - description
        - amount
      properties:
        discount_code:
          type: string
          maxLength: 45
        description:
          type: string
          maxLength: 100
        amount:
          type: number
        note:
          type: string
      additionalProperties: false
    Surcharge:
      type: object
      required:
        - description
        - amount
      properties:
        surcharge_code:
          type: string
          maxLength: 45
        description:
          type: string
          maxLength: 100
        amount:
          type: number
        note:
          type: string
      additionalProperties: false
    Tax:
      type: object
      required:
        - description
        - amount
      properties:
        tax_code:
          type: string
          description: Tатварын код (e.g. CITY_TAX, VAT)
          example: VAT
        description:
          type: string
          maxLength: 100
        amount:
          type: number
        city_tax:
          type: number
          nullable: true
        note:
          type: string
      additionalProperties: false
    Transaction:
      type: object
      required:
        - description
        - amount
      properties:
        description:
          type: string
          maxLength: 100
        amount:
          type: number
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/BankAccount"
      additionalProperties: false
    BankAccount:
      type: object
      required:
        - account_bank_code
        - account_number
        - account_name
        - account_currency
      properties:
        account_bank_code:
          type: string
          description: valid(bank)
        account_number:
          type: string
          maxLength: 100
        account_name:
          type: string
          maxLength: 100
        account_currency:
          type: string
          description: valid(currency)
      additionalProperties: false
    CreateInvoiceResponse:
      type: object
      required:
        - invoice_id
        - qr_text
        - qr_image
        - urls
      properties:
        invoice_id:
          type: string
          description: Object id
          example: 00f94137-66fd-4d90-b2b2-8225c1b4ed2d
        qr_text:
          type: string
          description: Данс болон картын гүйлгээ дэмжих QR утга
        qr_image:
          type: string
          description: Зурган хэлбэрээр үүсэх QR (data URL эсвэл base64 байж болно)
        urls:
          type: array
          items:
            $ref: "#/components/schemas/BankDeeplink"
      additionalProperties: false
    BankDeeplink:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        link:
          type: string
      additionalProperties: false
    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
      required: [message]
security:
  - BearerAuth: []
  - BasicAuth: []
tags:
  - name: invoice
    description: Invoice APIs
  - name: auth
    description: Auth APIs
  - name: subscription
    description: Subscription APIs
  - name: ebarimt
    description: Ebarimt APIs
  - name: payment
    description: Payment APIs
