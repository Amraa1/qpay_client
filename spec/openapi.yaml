openapi: 3.1.0
info:
  title: QPay API
  version: 1.0.0
  description: Төлбөрийн картаар төлбөр хүлээн авах сервис
servers:
  - url: https://merchant.qpay.mn
    description: Production
  - url: https://merchant-sandbox.qpay.mn
    description: Sandbox
paths:
  /v2/auth/token:
    post:
      summary: token
      operationId: authToken
      security:
        - BasicAuth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          description: client_id, client_secret
          schema: {}
          example: Basic
      responses:
        "200":
          description: token
          headers:
            Server:
              schema:
                type: string
              example: nginx/1.28.0
            Date:
              schema:
                type: string
              example: Thu, 29 Jan 2026 07:02:05 GMT
            Content-Length:
              schema:
                type: integer
              example: 815
            Connection:
              schema:
                type: string
              example: keep-alive
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: true
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: Content-Type, Authorization
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: undefined
            Etag:
              schema:
                type: string
              example: W/"32f-XhhslNZY7IK6NOM9CzTOeEROHpo"
            Set-Cookie:
              schema:
                type: string
              example: >-
                qpay_merchant_openapi.sid=s%3AYXZe2kHjVevwRjTeMWiIbdcTXobRVZBK.oo%2BsaoxW4CtDRqfymH2KeNDdY6t8KjwLEtyBBX30RIw;
                Path=/; Expires=Fri, 30 Jan 2026 07:02:05 GMT; HttpOnly
            X-Powered-By:
              schema:
                type: string
              example: Express
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000; includeSubDomains; preload
            X-XSS-Protection:
              schema:
                type: string
              example: 1; mode=block
            X-Frame-Options:
              schema:
                type: string
              example: SAMEORIGIN
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            Referrer-Policy:
              schema:
                type: string
              example: same-origin
            Content-Security-Policy:
              schema:
                type: string
              example: "default-src https: data: blob: 'unsafe-inline' 'unsafe-eval'"
            Permissions-Policy:
              schema:
                type: string
              example: >-
                geolocation=();midi=();notifications=();push=();sync-xhr=();microphone=();camera=();magnetometer=();gyroscope=();speaker=(self);vibrate=();fullscreen=(self);payment=();
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
              example:
                token_type: bearer
                refresh_expires_in: 1769756525
                refresh_token: >-
                  eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6Ijk5Y2ZiMWIyLTMyY2MtNGE0My05Y2NmLTY1Y2EzYmM5ODRhZiIsInNlc3Npb25fc2VjcmV0IjoiJDJiJDEwJElkeW16Y3JtbGlNRVRhY1ppNkxRZXU1QVZ3cGhEMFU2NGRQS2RwZFNqZXQ3MkljSU5lc3dhIiwiZXh0cmEiOnt9LCJpYXQiOjE3Njk2NzAxMjUsImV4cCI6MzUzOTQ0MTA1MH0.nhToVIW7fMWxzQ8Uf_TarFuGqkwmmW-FAusDi8KeA0s
                access_token: >-
                  eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJjbGllbnRfaWQiOiI5OWNmYjFiMi0zMmNjLTRhNDMtOWNjZi02NWNhM2JjOTg0YWYiLCJtZXJjaGFudF9pZCI6IktLVFQiLCJ2MV9tZXJjaGFudF9mbGFnIjpmYWxzZSwic2Vzc2lvbl9pZCI6IllYWmUya0hqVmV2d1JqVGVNV2lJYmRjVFhvYlJWWkJLIiwiaWF0IjoxNzY5NjcwMTI1LCJleHAiOjM1Mzk0MjY2NTB9.iey9iy7JgyOi9X3RMi7fUes_O1DnpE86Q23bo3GynQI
                expires_in: 1769756525
                scope: get_token
                not-before-policy: "0"
                session_state: sandbox
        "401":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          headers:
            Server:
              schema:
                type: string
              example: nginx/1.28.0
            Date:
              schema:
                type: string
              example: Thu, 29 Jan 2026 07:07:08 GMT
            Content-Length:
              schema:
                type: integer
              example: 93
            Connection:
              schema:
                type: string
              example: keep-alive
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: true
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: Content-Type, Authorization
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: undefined
            Etag:
              schema:
                type: string
              example: W/"5d-ZT2Tg3G60rCRFgw5os/8A6L9ghI"
            X-Powered-By:
              schema:
                type: string
              example: Express
            Content-Security-Policy:
              schema:
                type: string
              example: "default-src https: data: blob: 'unsafe-inline' 'unsafe-eval'"
      tags:
        - auth
      description: |-
        #### Access token авах API.

        username: client_id, password: client_secret -ийг qPay -ээс авна.
  /v2/auth/refresh:
    post:
      summary: refresh
      operationId: authRefresh
      security:
        - BearerAuth: []
      parameters:
        - name: Authorization
          in: header
          description: refresh_token
          schema:
            type: string
          example: Bearer
      responses:
        "200":
          description: refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
          headers:
            Server:
              schema:
                type: string
              example: nginx/1.28.0
            Date:
              schema:
                type: string
              example: Thu, 29 Jan 2026 07:25:07 GMT
            Content-Length:
              schema:
                type: integer
              example: 815
            Connection:
              schema:
                type: string
              example: keep-alive
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: true
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: Content-Type, Authorization
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: undefined
            Etag:
              schema:
                type: string
              example: W/"32f-6MWKzfxVjWYrXjHdWsKYuQCIzHY"
            X-Powered-By:
              schema:
                type: string
              example: Express
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000; includeSubDomains; preload
            X-XSS-Protection:
              schema:
                type: string
              example: 1; mode=block
            X-Frame-Options:
              schema:
                type: string
              example: SAMEORIGIN
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            Referrer-Policy:
              schema:
                type: string
              example: same-origin
            Content-Security-Policy:
              schema:
                type: string
              example: "default-src https: data: blob: 'unsafe-inline' 'unsafe-eval'"
            Permissions-Policy:
              schema:
                type: string
              example: >-
                geolocation=();midi=();notifications=();push=();sync-xhr=();microphone=();camera=();magnetometer=();gyroscope=();speaker=(self);vibrate=();fullscreen=(self);payment=();
        "401":
          description: refresh
          headers:
            Server:
              schema:
                type: string
              example: nginx/1.28.0
            Date:
              schema:
                type: string
              example: Thu, 29 Jan 2026 07:25:43 GMT
            Content-Length:
              schema:
                type: integer
              example: 53
            Connection:
              schema:
                type: string
              example: keep-alive
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: true
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: Content-Type, Authorization
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: undefined
            Etag:
              schema:
                type: string
              example: W/"35-frMBA9lZAoJZ16qEw7S6Ci+DxSY"
            X-Powered-By:
              schema:
                type: string
              example: Express
            Content-Security-Policy:
              schema:
                type: string
              example: "default-src https: data: blob: 'unsafe-inline' 'unsafe-eval'"
      tags:
        - auth
      description: |-
        #### Access token шинэчлэн авах API. 
        refresh_token -ийг ашиглана.
  /v2/invoice:
    post:
      operationId: createInvoice
      summary: Create
      description: |-
        #### Төлбөрийн нэхэмжлэл үүсгэх. 
        invoice_code -ийг qPay -ээс олгоно.
      tags:
        - invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
            example:
              invoice_code: TEST_INVOICE
              sender_invoice_no: "123455678"
              invoice_receiver_code: "83"
              sender_branch_code: BRANCH1
              invoice_description: Order No1311 200.00
              calculate_vat: false
              tax_type: "1"
              enable_expiry: false
              expiry_date: "2025-10-31"
              allow_partial: false
              allow_exceed: false
              allow_subscribe: true
              next_payment_date: "2025-12-27T14:51:26.751Z"
              subscription_interval: 9999M
              subscription_webhook: https://hello.com
              amount: 100000
              callback_url: https://bd5492c3ee85.ngrok.io/payments?payment_id=12345678
              sender_staff_code: online

      parameters:
        - name: Authorization
          in: header
          required: false
          description: >-
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJjbGllbnRfaWQiOiI5OWNmYjFiMi0zMmNjLTRhNDMtOWNjZi02NWNhM2JjOTg0YWYiLCJzZXNzaW9uX2lkIjoiN2wzdnN2eW81RWtDbHRiQk9SU0Nrb29LZDN6aDhsQVMiLCJpYXQiOjE3NTY3MTM4NDMsImV4cCI6MzUxMzUxNDA4Nn0.OMczW21CNPZawyX02oCIPUsSfM9FK8dF7NtcgebuncQ
          deprecated: false
          schema: {}
          example: Bearer
      responses:
        "200":
          description: Create Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvoiceResponse"
          headers:
            Server:
              schema:
                type: string
              example: nginx/1.28.0
            Date:
              schema:
                type: string
              example: Thu, 29 Jan 2026 08:24:32 GMT
            Content-Length:
              schema:
                type: integer
              example: 17933
            Connection:
              schema:
                type: string
              example: keep-alive
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: true
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: Content-Type, Authorization
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: undefined
            Etag:
              schema:
                type: string
              example: W/"460d-X0Vd/SmqxqAWB5TwtvE7UY0NoCg"
            X-Powered-By:
              schema:
                type: string
              example: Express
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000; includeSubDomains; preload
            X-XSS-Protection:
              schema:
                type: string
              example: 1; mode=block
            X-Frame-Options:
              schema:
                type: string
              example: SAMEORIGIN
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            Referrer-Policy:
              schema:
                type: string
              example: same-origin
            Content-Security-Policy:
              schema:
                type: string
              example: "default-src https: data: blob: 'unsafe-inline' 'unsafe-eval'"
            Permissions-Policy:
              schema:
                type: string
              example: >-
                geolocation=();midi=();notifications=();push=();sync-xhr=();microphone=();camera=();magnetometer=();gyroscope=();speaker=(self);vibrate=();fullscreen=(self);payment=();

        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

